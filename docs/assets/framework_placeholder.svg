<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">D-NSGA2+ framework placeholder</title>
  <desc id="desc">A public placeholder diagram for the D-NSGA2+ framework.</desc>
  <rect width="960" height="360" fill="#f8fafc"/>
  <rect x="40" y="60" width="180" height="90" rx="16" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  <rect x="280" y="60" width="180" height="90" rx="16" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <rect x="520" y="60" width="180" height="90" rx="16" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <rect x="740" y="60" width="180" height="90" rx="16" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
  <rect x="280" y="220" width="180" height="90" rx="16" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
  <rect x="520" y="220" width="180" height="90" rx="16" fill="#e2e8f0" stroke="#334155" stroke-width="2"/>
  <text x="130" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Input instances</text>
  <text x="370" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Initialization</text>
  <text x="610" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">IoP/SPO</text>
  <text x="610" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">objective selection</text>
  <text x="830" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">AOS</text>
  <text x="830" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">mutation choice</text>
  <text x="370" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Evolution</text>
  <text x="370" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">crossover + mutation</text>
  <text x="610" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">External archive</text>
  <text x="610" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">final nondominated set</text>
  <path d="M220 105 H280" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M460 105 H520" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M700 105 H740" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M830 150 C830 205 700 235 700 265" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M520 265 H460" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M370 220 C370 180 610 180 610 150" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
